/* HEADER FIXO */
.app-header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

.header-logo { display: flex; align-items: center; gap: 10px; }
.header-logo img { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }
.header-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
.header-sub { font-size: 11px; color: var(--text3); }
.header-mes select {
  font-size: 12px; padding: 5px 8px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  background: white;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  max-width: 130px;
}

/* CONTEÚDO */
.content {
  padding-top: calc(var(--header-h) + 12px);
  padding-bottom: calc(var(--nav-h) + 16px);
  padding-left: 12px; padding-right: 12px;
  min-height: 100vh;
}

/* NAV INFERIOR */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
}

.nav-tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  border: none; background: none; cursor: pointer;
  color: var(--text3); font-size: 10px; font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.nav-tab svg { transition: all 0.15s; }
.nav-tab.active { color: var(--gold); }
.nav-tab.active svg { stroke: var(--gold); }

/* PÁGINAS */
.page { display: none; animation: fadeIn 0.2s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* CARDS */
.card {
  background: var(--surface);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  overflow: hidden;
  margin-bottom: 12px;
}

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.card-title { font-size: 14px; font-weight: 600; }
.card-body { padding: 16px; }

/* STAT CARDS */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card {
  background: var(--surface);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.stat-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
.stat-value { font-size: 18px; font-weight: 700; }
.stat-value.green { color: var(--green); }
.stat-value.amber { color: var(--amber); }
.stat-value.red { color: var(--red); }
.stat-value.gold { color: var(--gold); }

/* LISTA DE ITENS */
.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  background: transparent;
}
.list-item:last-child { border-bottom: none; }
.list-item:active { background: var(--gold-light); }

.avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--gold-light); color: var(--gold-dark);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}

.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-sub { font-size: 12px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* BADGES */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 99px;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.badge.pago { background: var(--green-light); color: var(--green); }
.badge.pendente { background: var(--amber-light); color: var(--amber); }
.badge.atrasado { background: var(--red-light); color: var(--red); }

/* BOTÕES */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 18px; border-radius: var(--radius);
  font-size: 14px; font-weight: 600;
  border: 1px solid var(--border2);
  background: white; color: var(--text);
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn.primary { background: var(--gold); color: white; border-color: var(--gold); }
.btn.primary:active { background: var(--gold-dark); }
.btn.success { background: var(--green-light); color: var(--green); border-color: var(--green-light); }
.btn.danger { background: var(--red-light); color: var(--red); border-color: var(--red-light); }
.btn.full { width: 100%; }
.btn.sm { padding: 7px 12px; font-size: 12px; }

/* FAB */
.fab {
  position: fixed; bottom: calc(var(--nav-h) + 16px); right: 16px;
  width: 52px; height: 52px;
  background: var(--gold); color: white;
  border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(212,137,10,0.45);
  z-index: 90; -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
}
.fab:active { transform: scale(0.92); }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  z-index: 200; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: rgba(255,255,255,0.97);
  border-radius: 20px 20px 0 0;
  width: 100%; max-height: 92vh;
  overflow-y: auto; padding-bottom: env(safe-area-inset-bottom, 16px);
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-handle {
  width: 36px; height: 4px; background: #ddd;
  border-radius: 99px; margin: 12px auto 0;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 16px; font-weight: 700; }
.modal-body { padding: 16px 20px; }
.modal-footer {
  display: flex; gap: 10px; padding: 12px 20px;
  border-top: 1px solid var(--border);
}

/* FORMS */
.form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; }
input, select, textarea {
  width: 100%; padding: 12px 14px;
  border: 1px solid var(--border2); border-radius: var(--radius);
  font-size: 15px; font-family: 'DM Sans', sans-serif;
  color: var(--text); background: white;
  -webkit-appearance: none; appearance: none;
  outline: none;
}
input:focus, select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,137,10,0.12); }

/* SEÇÃO */
.section-label {
  font-size: 11px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.8px;
  padding: 14px 4px 6px;
}

/* PROGRESS */
.progress-wrap { background: rgba(0,0,0,0.08); border-radius: 99px; height: 6px; overflow: hidden; margin-top: 8px; }
.progress-bar { height: 100%; background: var(--green); border-radius: 99px; }

/* ALERTAS */
.alerta {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: var(--radius);
  margin-bottom: 10px; border: 1px solid;
}
.alerta.vermelho { background: var(--red-light); border-color: #f5c0c0; }
.alerta.amarelo { background: var(--amber-light); border-color: #f5d89a; }

/* TOAST */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + 80px); left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #1a1916; color: white;
  padding: 11px 20px; border-radius: 99px;
  font-size: 13px; font-weight: 500;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  z-index: 999; opacity: 0; transition: all 0.25s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* SUMMARY */
.summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
.summary-row:last-child { border-bottom: none; font-weight: 700; font-size: 15px; margin-top: 4px; }

.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.verde { background: var(--green); }
.dot.amarelo { background: var(--amber); }
.dot.vermelho { background: var(--red); }

.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
.empty-icon { font-size: 36px; margin-bottom: 12px; }

/* MANUT CARDS GRID */
.manut-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.manut-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
</style>

// ===== STATE =====
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MANUT_ICONES = {'Vistoria':'🔍','Licenciamento':'📄','Tacógrafo':'⏱️','Troca de óleo':'🛢️','Pneu':'⭕','Revisão geral':'🔧','Freios':'🛑','Correia':'⚙️','Outro':'🔩'};

let db = {"alunos":[],"mensalidades":[],"despesas":[],"manutencoes":[],"nextId":1};
let currentPage = 'dashboard';

function load() {
  try { const s = localStorage.getItem('van_escolar_db'); if (s) { db = JSON.parse(s); if (!db.manutencoes) db.manutencoes = []; } } catch(e) {}
}
function save() { localStorage.setItem('van_escolar_db', JSON.stringify(db)); }
function genId() { return db.nextId++; }

function fmt(v) { return 'R$ ' + Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(iso) { if (!iso) return '—'; const [y,m,d] = iso.split('-'); return `${d}/${m}/${y}`; }
function initials(n) { if (!n) return '??'; return n.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function getMesKey(d) { const dt = d||new Date(); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`; }
function getMesLabel(k) { const [y,m]=k.split('-'); return `${MESES[parseInt(m)-1]} ${y}`; }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function populateMes() {
  const hoje = new Date(); const atual = getMesKey();
  const meses = [];
  for (let i = -3; i <= 5; i++) {
    const d = new Date(hoje.getFullYear(), hoje.getMonth()+i, 1);
    const k = getMesKey(d);
    meses.push(`<option value="${k}" ${k===atual?'selected':''}>${getMesLabel(k)}</option>`);
  }
  document.getElementById('global-mes').innerHTML = meses.join('');
}

function getMes() { return document.getElementById('global-mes').value; }
function onMesChange() { renderPage(currentPage); }

function goPage(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if (btn) btn.classList.add('active');
  currentPage = page;
  renderPage(page);
  // Mostrar/ocultar FAB
  const fabPages = ['alunos','mensalidades','despesas','manutencao'];
  document.getElementById('fab-btn').style.display = fabPages.includes(page) ? 'flex' : 'none';
}

function renderPage(p) {
  if (p==='dashboard') renderDashboard();
  else if (p==='alunos') renderAlunos();
  else if (p==='mensalidades') renderMensalidades();
  else if (p==='despesas') renderDespesas();
  else if (p==='manutencao') renderManutencao();
}

function abrirFab() {
  if (currentPage==='alunos') { clearAlunoForm(); openModal('modal-aluno'); }
  else if (currentPage==='despesas') { document.getElementById('d-data').value=new Date().toISOString().split('T')[0]; openModal('modal-despesa'); }
  else if (currentPage==='manutencao') { clearManutForm(); openModal('modal-manut'); }
  else if (currentPage==='mensalidades') gerarMensalidades();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ===== DASHBOARD =====
function renderDashboard() {
  const mes = getMes();
  const mensMes = db.mensalidades.filter(m => m.mes===mes);
  const despMes = db.despesas.filter(d => d.data&&d.data.startsWith(mes));
  const totalMens = mensMes.reduce((s,m)=>s+m.valor,0);
  const recebido = mensMes.filter(m=>m.status==='pago').reduce((s,m)=>s+(m.valorPago||m.valor),0);
  const pendente = totalMens - mensMes.filter(m=>m.status==='pago').reduce((s,m)=>s+m.valor,0);
  const totalDesp = despMes.reduce((s,d)=>s+d.valor,0);
  const saldo = recebido - totalDesp;
  const pct = totalMens ? Math.round(recebido/totalMens*100) : 0;

  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Alunos</div><div class="stat-value gold">${db.alunos.length}</div></div>
    <div class="stat-card"><div class="stat-label">Recebido</div><div class="stat-value green">${fmt(recebido)}</div></div>
    <div class="stat-card"><div class="stat-label">A receber</div><div class="stat-value amber">${fmt(pendente)}</div></div>
    <div class="stat-card"><div class="stat-label">Saldo</div><div class="stat-value ${saldo>=0?'green':'red'}">${fmt(saldo)}</div></div>
  `;

  document.getElementById('dash-resumo').innerHTML = `
    <div class="summary-row"><span style="color:var(--text2)">Total mensalidades</span><span>${fmt(totalMens)}</span></div>
    <div class="summary-row"><span style="color:var(--text2)">Recebido</span><span style="color:var(--green)">${fmt(recebido)}</span></div>
    <div class="summary-row"><span style="color:var(--text2)">Despesas</span><span style="color:var(--red)">${fmt(totalDesp)}</span></div>
    <div class="summary-row"><span>Saldo final</span><span style="color:${saldo>=0?'var(--green)':'var(--red)'}">${fmt(saldo)}</span></div>
    <div style="margin-top:12px;font-size:12px;color:var(--text3);margin-bottom:5px;">Cobrança: ${pct}%</div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
  `;

  const pendentes = mensMes.filter(m=>m.status==='pendente');
  const pdiv = document.getElementById('dash-pendentes');
  if (!pendentes.length) {
    pdiv.innerHTML = '<div class="empty" style="padding:24px;"><div style="font-size:28px;margin-bottom:8px">🎉</div><div>Tudo pago!</div></div>';
  } else {
    pdiv.innerHTML = pendentes.map(m => `
      <div class="list-item">
        <div class="avatar">${initials(m.alunoNome)}</div>
        <div class="item-info"><div class="item-name">${m.alunoNome}</div><div class="item-sub">${fmt(m.valor)}</div></div>
        <button class="btn success sm" onclick="abrirPagamento(${m.id})">Receber</button>
      </div>
    `).join('');
  }
}

// ===== ALUNOS =====
function clearAlunoForm() {
  ['a-id','a-nome','a-escola','a-resp','a-tel','a-obs'].forEach(id=>document.getElementById(id).value='');
  ['a-valor','a-venc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-aluno-title').textContent='Novo aluno';
}

function salvarAluno() {
  const nome=document.getElementById('a-nome').value.trim();
  const escola=document.getElementById('a-escola').value.trim();
  const resp=document.getElementById('a-resp').value.trim();
  const tel=document.getElementById('a-tel').value.trim();
  const valor=parseFloat(document.getElementById('a-valor').value);
  const venc=parseInt(document.getElementById('a-venc').value)||10;
  const obs=document.getElementById('a-obs').value.trim();
  const editId=document.getElementById('a-id').value;
  if (!nome||!escola||isNaN(valor)) { toast('⚠️ Preencha os campos obrigatórios'); return; }
  if (editId) {
    const a=db.alunos.find(x=>x.id==editId);
    if (a) Object.assign(a,{nome,escola,resp,tel,valor,venc,obs});
    toast('Aluno atualizado!');
  } else {
    db.alunos.push({id:genId(),nome,escola,resp,tel,valor,venc,obs,ativo:true});
    toast('Aluno cadastrado!');
  }
  save(); closeModal('modal-aluno'); renderAlunos();
}

function renderAlunos() {
  const el=document.getElementById('alunos-list');
  document.getElementById('alunos-label').textContent=`${db.alunos.length} aluno(s) cadastrado(s)`;
  if (!db.alunos.length) { el.innerHTML='<div class="empty"><div class="empty-icon">🎒</div><div>Nenhum aluno ainda.</div></div>'; return; }
  const porEscola={};
  db.alunos.forEach(a=>{ const e=a.escola||'Sem escola'; if(!porEscola[e]) porEscola[e]=[]; porEscola[e].push(a); });
  el.innerHTML = Object.keys(porEscola).sort().map(escola => `
    <div style="padding:10px 16px;background:var(--gold-light);border-bottom:1px solid var(--border);">
      <span style="font-size:12px;font-weight:700;color:var(--gold-dark);text-transform:uppercase;">🏫 ${escola}</span>
      <span style="font-size:11px;color:var(--gold);margin-left:8px;">${porEscola[escola].length} aluno(s)</span>
    </div>
    ${porEscola[escola].sort((a,b)=>a.nome.localeCompare(b.nome)).map(a=>`
      <div class="list-item">
        <div class="avatar">${initials(a.nome)}</div>
        <div class="item-info">
          <div class="item-name">${a.nome}</div>
          <div class="item-sub">${fmt(a.valor)} · ${a.resp||'Sem responsável'}</div>
        </div>
        <button class="btn sm" onclick="editarAluno(${a.id})">✏️</button>
      </div>
    `).join('')}
  `).join('');
}

function editarAluno(id) {
  const a=db.alunos.find(x=>x.id===id); if (!a) return;
  document.getElementById('a-id').value=a.id;
  document.getElementById('a-nome').value=a.nome;
  document.getElementById('a-escola').value=a.escola;
  document.getElementById('a-resp').value=a.resp||'';
  document.getElementById('a-tel').value=a.tel||'';
  document.getElementById('a-valor').value=a.valor;
  document.getElementById('a-venc').value=a.venc;
  document.getElementById('a-obs').value=a.obs||'';
  document.getElementById('modal-aluno-title').textContent='Editar aluno';
  openModal('modal-aluno');
}

// ===== MENSALIDADES =====
function gerarMensalidades() {
  if (!db.alunos.length) { toast('⚠️ Cadastre alunos primeiro'); return; }
  const mes=getMes();
  const jaExiste=db.mensalidades.some(m=>m.mes===mes);
  if (jaExiste) { toast('Mensalidades já geradas para este mês'); return; }
  db.alunos.forEach(a=>{
    const [y,m]=mes.split('-');
    db.mensalidades.push({id:genId(),alunoId:a.id,alunoNome:a.nome,mes,valor:a.valor,
      vencimento:`${y}-${m}-${String(a.venc).padStart(2,'0')}`,
      status:'pendente',dataPag:null,valorPago:null,forma:null});
  });
  save(); toast(`${db.alunos.length} mensalidades geradas!`); renderMensalidades();
}

function abrirPagamento(id) {
  const m=db.mensalidades.find(x=>x.id===id); if (!m) return;
  document.getElementById('pag-id').value=id;
  document.getElementById('pag-nome').textContent=m.alunoNome;
  document.getElementById('pag-info').textContent=`${getMesLabel(m.mes)} · ${fmt(m.valor)}`;
  document.getElementById('pag-data').value=new Date().toISOString().split('T')[0];
  document.getElementById('pag-valor').value=m.valor;
  openModal('modal-pag');
}

function confirmarPagamento() {
  const id=parseInt(document.getElementById('pag-id').value);
  const data=document.getElementById('pag-data').value;
  const valor=parseFloat(document.getElementById('pag-valor').value);
  const forma=document.getElementById('pag-forma').value;
  if (!data||isNaN(valor)) { toast('⚠️ Preencha data e valor'); return; }
  const m=db.mensalidades.find(x=>x.id===id);
  if (m) { m.status='pago'; m.dataPag=data; m.valorPago=valor; m.forma=forma; }
  save(); closeModal('modal-pag'); renderMensalidades(); renderDashboard();
  toast('✅ Pagamento registrado!');
}

function renderMensalidades() {
  const mes=getMes();
  const lista=db.mensalidades.filter(m=>m.mes===mes);
  const el=document.getElementById('mens-list');
  const progCard=document.getElementById('mens-progress-card');
  if (!lista.length) { el.innerHTML='<div class="empty"><div class="empty-icon">📅</div><div>Nenhuma mensalidade gerada.<br>Use o botão acima.</div></div>'; progCard.style.display='none'; return; }
  const total=lista.reduce((s,m)=>s+m.valor,0);
  const pago=lista.filter(m=>m.status==='pago').reduce((s,m)=>s+m.valor,0);
  const pct=total?Math.round(pago/total*100):0;
  progCard.style.display='block';
  document.getElementById('mens-prog-txt').textContent=`${lista.filter(m=>m.status==='pago').length}/${lista.length} pagas · ${fmt(pago)}`;
  document.getElementById('mens-prog-pct').textContent=pct+'%';
  document.getElementById('mens-prog-bar').style.width=pct+'%';
  el.innerHTML=lista.map(m=>`
    <div class="list-item">
      <div class="avatar">${initials(m.alunoNome)}</div>
      <div class="item-info">
        <div class="item-name">${m.alunoNome}</div>
        <div class="item-sub">${fmt(m.valor)}${m.dataPag?' · Pago '+fmtDate(m.dataPag):''}</div>
      </div>
      ${m.status==='pago'
        ? `<span class="badge pago">✓ Pago</span>`
        : `<button class="btn success sm" onclick="abrirPagamento(${m.id})">Receber</button>`}
    </div>
  `).join('');
}

// ===== DESPESAS =====
function salvarDespesa() {
  const desc=document.getElementById('d-desc').value.trim();
  const cat=document.getElementById('d-cat').value;
  const valor=parseFloat(document.getElementById('d-valor').value);
  const data=document.getElementById('d-data').value;
  if (!desc||isNaN(valor)||!data) { toast('⚠️ Preencha todos os campos'); return; }
  db.despesas.push({id:genId(),desc,cat,valor,data,obs:''});
  save(); closeModal('modal-despesa'); renderDespesas(); toast('Despesa salva!');
}

function renderDespesas() {
  const mes=getMes();
  const lista=db.despesas.filter(d=>d.data&&d.data.startsWith(mes)).sort((a,b)=>b.data.localeCompare(a.data));
  const total=lista.reduce((s,d)=>s+d.valor,0);
  document.getElementById('desp-resumo-card').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div><div style="font-size:11px;color:var(--text3);text-transform:uppercase;font-weight:600;">Total do mês</div><div style="font-size:22px;font-weight:700;color:var(--red);margin-top:2px;">${fmt(total)}</div></div>
      <div style="font-size:28px;">💸</div>
    </div>
  `;
  const el=document.getElementById('desp-list');
  if (!lista.length) { el.innerHTML='<div class="empty"><div class="empty-icon">🔧</div><div>Nenhuma despesa neste mês.</div></div>'; return; }
  el.innerHTML=lista.map(d=>`
    <div class="list-item">
      <div style="font-size:22px;flex-shrink:0;">${({'Combustível':'⛽','Manutenção':'🔧','Seguro':'📋','Pneu':'⭕','Financiamento':'🏦','Salário Monitora':'👩','Outro':'📌'})[d.cat]||'📌'}</div>
      <div class="item-info">
        <div class="item-name">${d.desc}</div>
        <div class="item-sub">${d.cat} · ${fmtDate(d.data)}</div>
      </div>
      <span style="font-weight:700;color:var(--red);font-size:14px;">${fmt(d.valor)}</span>
    </div>
  `).join('');
}

// ===== MANUTENÇÃO =====
function clearManutForm() {
  ['mn-id','mn-desc','mn-km','mn-prox-data','mn-prox-km','mn-valor','mn-local'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mn-data').value=new Date().toISOString().split('T')[0];
  document.getElementById('mn-tipo').selectedIndex=0;
}

function salvarManutencao() {
  const tipo=document.getElementById('mn-tipo').value;
  const desc=document.getElementById('mn-desc').value.trim();
  const data=document.getElementById('mn-data').value;
  const km=document.getElementById('mn-km').value;
  const proxData=document.getElementById('mn-prox-data').value;
  const proxKm=document.getElementById('mn-prox-km').value;
  const valor=document.getElementById('mn-valor').value;
  const local=document.getElementById('mn-local').value.trim();
  const editId=document.getElementById('mn-id').value;
  if (!data) { toast('⚠️ Informe a data'); return; }
  const reg={tipo,desc,data,km:km?parseInt(km):null,proxData:proxData||null,proxKm:proxKm?parseInt(proxKm):null,valor:valor?parseFloat(valor):null,local};
  if (editId) {
    const idx=db.manutencoes.findIndex(m=>m.id==editId);
    if (idx>=0) db.manutencoes[idx]={...db.manutencoes[idx],...reg};
    toast('Atualizado!');
  } else {
    reg.id=genId(); db.manutencoes.push(reg); toast('Registro salvo!');
  }
  save(); closeModal('modal-manut'); renderManutencao();
}

function diasAteVencer(iso) {
  if (!iso) return null;
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const alvo=new Date(iso+'T00:00:00');
  return Math.round((alvo-hoje)/(1000*60*60*24));
}

function renderManutencao() {
  if (!db.manutencoes) db.manutencoes=[];
  const tipos=['Vistoria','Licenciamento','Tacógrafo','Troca de óleo','Pneu','Revisão geral'];
  const ultimo={};
  db.manutencoes.forEach(m=>{ if(!ultimo[m.tipo]||m.data>ultimo[m.tipo].data) ultimo[m.tipo]=m; });

  // Alertas
  const alertas=[];
  Object.entries(ultimo).forEach(([tipo,reg])=>{
    if (!reg.proxData) return;
    const dias=diasAteVencer(reg.proxData);
    if (dias!==null && dias<=30) alertas.push({tipo,reg,dias});
  });
  document.getElementById('manut-alertas').innerHTML=alertas.sort((a,b)=>a.dias-b.dias).map(a=>`
    <div class="alerta ${a.dias<0?'vermelho':'amarelo'}">
      <span style="font-size:20px;">${a.dias<0?'🚨':'⚠️'}</span>
      <div>
        <div style="font-size:13px;font-weight:700;">${a.tipo} — ${a.dias<0?`Vencido há ${Math.abs(a.dias)} dia(s)`:`Vence em ${a.dias} dia(s)`}</div>
        <div style="font-size:11px;color:var(--text2);">Última: ${fmtDate(a.reg.data)} · Próxima: ${fmtDate(a.reg.proxData)}</div>
      </div>
    </div>
  `).join('');

  // Grid de status
  document.getElementById('manut-status').innerHTML=tipos.map(tipo=>{
    const reg=ultimo[tipo];
    const dias=reg?diasAteVencer(reg.proxData):null;
    const cor=dias===null?'#ccc':dias<0?'var(--red)':dias<=30?'var(--amber)':'var(--green)';
    return `<div class="manut-card" style="border-left:3px solid ${cor};">
      <div style="font-size:18px;">${MANUT_ICONES[tipo]||'🔧'}</div>
      <div style="font-size:12px;font-weight:700;margin-top:4px;">${tipo}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px;">${reg?fmtDate(reg.data):'Sem registro'}</div>
      ${reg&&reg.proxData?`<div style="font-size:11px;font-weight:600;color:${cor};margin-top:2px;">${dias<0?'Vencido':dias===0?'Hoje':dias+'d'}</div>`:''}</div>`;
  }).join('');

  // Lista
  const lista=[...db.manutencoes].sort((a,b)=>b.data.localeCompare(a.data));
  const el=document.getElementById('manut-list');
  if (!lista.length) { el.innerHTML='<div class="empty"><div class="empty-icon">🔧</div><div>Nenhum registro ainda.</div></div>'; return; }
  el.innerHTML=lista.map(m=>{
    const dias=diasAteVencer(m.proxData);
    const cor=dias===null?'var(--text3)':dias<0?'var(--red)':dias<=30?'var(--amber)':'var(--green)';
    return `<div class="list-item">
      <div style="font-size:22px;">${MANUT_ICONES[m.tipo]||'🔩'}</div>
      <div class="item-info">
        <div class="item-name">${m.tipo}${m.desc?' — '+m.desc:''}</div>
        <div class="item-sub">${fmtDate(m.data)}${m.valor?' · '+fmt(m.valor):''}</div>
        ${m.proxData?`<div style="font-size:11px;font-weight:600;color:${cor};">Próxima: ${fmtDate(m.proxData)}</div>`:''}</div>
      <button class="btn sm" onclick="editarManutencao(${m.id})">✏️</button>
    </div>`;
  }).join('');
}

function editarManutencao(id) {
  const m=db.manutencoes.find(x=>x.id===id); if (!m) return;
  document.getElementById('mn-id').value=m.id;
  document.getElementById('mn-tipo').value=m.tipo;
  document.getElementById('mn-desc').value=m.desc||'';
  document.getElementById('mn-data').value=m.data;
  document.getElementById('mn-km').value=m.km||'';
  document.getElementById('mn-prox-data').value=m.proxData||'';
  document.getElementById('mn-prox-km').value=m.proxKm||'';
  document.getElementById('mn-valor').value=m.valor||'';
  document.getElementById('mn-local').value=m.local||'';
  openModal('modal-manut');
}

// ===== INIT =====
function init() {
  load();
  populateMes();
  document.getElementById('d-data').value=new Date().toISOString().split('T')[0];
  document.getElementById('mn-data').value=new Date().toISOString().split('T')[0];
  document.getElementById('fab-btn').style.display='none';
  renderDashboard();
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open')); });
}

init();
</script>
</body>
</html>
